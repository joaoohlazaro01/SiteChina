 <style>
    .logo-flag {

.navbar-china {

.navbar-china .nav-link {

.navbar-china .nav-link:hover {
    color: #fff;

/* links */
.navbar-china .nav-link.active {
    color: #fff;
    border-bottom: 2px solid #ffde00; /*linha embaixo dos links*/

/* borda do menu do nav */
.navbar-china .navbar-toggler {
    border-color: #a08716;

.footer{
background: linear-gradient(90deg, #c02e1b 0%, #dd0c0c 50%, #7c0f0f 100%);
